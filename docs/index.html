<body>
    <H1> Fasion-MNIST Check </H1>
    <div><button type="button" onclick="allClear()" class="button">Clear</button>
        <span id="result" class="result"></span>
    </div>
    <table>
        <tr class="header">
            <td>Please draw here</td>
            <td>Input Image</td>
        </tr>
        <tr>
            <td><canvas id='canvas' width=280 height=280 style="background-color:black;"></canvas></td>
            <td><canvas id='canvas2' width=280 height=280 style="background-color:black;"></canvas></td>
        </tr>
        <tr>
            <td></td>
            <td>
                <div id="result" class="result"></div>
            </td>
        </tr>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script type="text/javascript" src="draw.js"></script>
    <script>
        let model;
        window.onload = async function () {
            drawSetup($('canvas'), $('canvas2'));
            try {
                model = await tf.loadGraphModel('./model/model.json'); console.log('graph model loaded');
            } catch (e) {
                console.error('failed to load model:', e);
            }
        }

        function allClear() {
            $('result').innerHTML = "";
            canvasClear($('canvas'));
            canvasClear($('canvas2'));
        }

        function $(id) {
            return document.getElementById(id);
        }
    </script>
